# CI - Lint, Typecheck, Build, Test, Coverage, Security (Nx monorepo)
#
# Matrix strategy runs lint/typecheck/build/test across affected packages.
# Coverage results feed into SonarCloud. CodeQL and dependency review
# run as independent security jobs.
name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6am UTC

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  PNPM_VERSION: 9

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Determine which packages are affected
  # ────────────────────────────────────────────────────────────────────
  affected:
    name: Detect affected packages
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set-matrix.outputs.packages }}
      has_affected: ${{ steps.set-matrix.outputs.has_affected }}
      nx_base: ${{ steps.base.outputs.ref }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive Nx base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - name: List affected packages
        id: set-matrix
        run: |
          # Get affected project names as JSON array for the matrix
          AFFECTED=$(pnpm nx show projects --affected --base=${{ steps.base.outputs.ref }} --type lib 2>/dev/null || echo "")
          if [ -z "$AFFECTED" ]; then
            echo "packages=[]" >> "$GITHUB_OUTPUT"
            echo "has_affected=false" >> "$GITHUB_OUTPUT"
          else
            # Convert newline-separated list to compact JSON array (must be single-line for GITHUB_OUTPUT)
            JSON=$(echo "$AFFECTED" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "packages=$JSON" >> "$GITHUB_OUTPUT"
            echo "has_affected=true" >> "$GITHUB_OUTPUT"
          fi

  # ────────────────────────────────────────────────────────────────────
  # Matrix: lint, typecheck, build, test per affected package
  # ────────────────────────────────────────────────────────────────────
  check:
    name: "${{ matrix.task }} / ${{ matrix.package }}"
    needs: affected
    if: needs.affected.outputs.has_affected == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.affected.outputs.packages) }}
        task: [lint, typecheck, build, test]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Nx cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .nx/cache
          key: nx-${{ matrix.package }}-${{ matrix.task }}-${{ github.sha }}
          restore-keys: |
            nx-${{ matrix.package }}-${{ matrix.task }}-
            nx-${{ matrix.package }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.task }}
        run: pnpm nx run "${{ matrix.package }}:${{ matrix.task }}"
        continue-on-error: ${{ matrix.task == 'typecheck' }}

      - name: Upload coverage
        if: matrix.task == 'test' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ strategy.job-index }}
          path: |
            packages/*/coverage/lcov.info
            plugins/*/coverage/lcov.info
            adapters/*/coverage/lcov.info
          if-no-files-found: ignore
          retention-days: 3

  # ────────────────────────────────────────────────────────────────────
  # Docs: unit tests, typecheck, build verification
  # ────────────────────────────────────────────────────────────────────
  docs:
    name: "Docs / ${{ matrix.task }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [test, typecheck, build]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Nx cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .nx/cache
          key: nx-docs-${{ matrix.task }}-${{ github.sha }}
          restore-keys: |
            nx-docs-${{ matrix.task }}-
            nx-docs-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (docs depends on type exports)
        if: matrix.task == 'typecheck' || matrix.task == 'build'
        run: pnpm nx run-many -t build --exclude @strata-game-library/docs

      - name: Run ${{ matrix.task }}
        run: pnpm nx run @strata-game-library/docs:${{ matrix.task }}

  # ────────────────────────────────────────────────────────────────────
  # Browser integration (after matrix passes)
  # ────────────────────────────────────────────────────────────────────
  e2e:
    name: Core Browser Integration
    needs: [affected, check]
    if: needs.affected.outputs.has_affected == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --dir packages/core exec playwright install --with-deps chromium

      - name: Build core browser test dependencies
        run: pnpm nx run @strata-game-library/core:build

      - name: Run core browser integration tests
        run: pnpm nx run @strata-game-library/core:test:e2e

      - name: Upload browser integration results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: core-browser-integration-results
          path: |
            packages/core/test-results/
            packages/core/playwright-results/
          if-no-files-found: ignore
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────
  # Security: CodeQL handled by GitHub default setup (repo settings)
  # ────────────────────────────────────────────────────────────────────

  # ────────────────────────────────────────────────────────────────────
  # Security: Dependency Review (PRs only)
  # ────────────────────────────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        continue-on-error: true
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

# CD - Release Please & Deploy Docs (Nx monorepo)
#
# Handles:
#   1. Release Please: creates/updates Release PRs with version bumps and changelogs.
#      When a Release PR is merged, creates GitHub Releases (which trigger release.yml).
#   2. Docs deployment to GitHub Pages (on every push to main).
#
# npm publishing is handled separately by release.yml (triggered by GitHub Releases).
name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: cd-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  PNPM_VERSION: 9

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Release Please: version bumps, changelogs, tags, GitHub Releases
  # ────────────────────────────────────────────────────────────────────
  release-please:
    name: Release Please
    if: "!contains(github.event.head_commit.message || '', '[skip actions]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.CI_GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ────────────────────────────────────────────────────────────────────
  # Deploy docs to GitHub Pages (independent of release)
  # ────────────────────────────────────────────────────────────────────
  docs:
    name: Deploy Docs
    if: "!contains(github.event.head_commit.message || '', '[skip actions]') && !cancelled()"
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages (docs depends on type exports)
        run: pnpm nx run-many -t build --exclude @strata-game-library/docs

      - name: Build docs
        run: pnpm nx run @strata-game-library/docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: apps/docs/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
